
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光影志 | 个人摄影作品展</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">光影志 <span>Photography</span></h1>
            <nav>
                <ul>
                    <li><a href="#">首页</a></li>
                    <li><a href="#">作品集</a></li>
                    <li><a href="#">关于我</a></li>
                    <li><a href="#">联系方式</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h2>捕捉世界的每一个瞬间</h2>
            <p>欢迎来到我的摄影主页。这里记录了我在旅行、生活和街头发现的独特光影。</p>
        </div>
    </section>

    <main class="gallery-container">
        <div class="gallery">
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=600&q=80" alt="自然风景摄影">
                <div class="overlay"><span>风光 / 自然</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=600&q=80" alt="城市夜景">
                <div class="overlay"><span>城市 / 建筑</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=600&q=80" alt="人像摄影">
                <div class="overlay"><span>人像 / 生活</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=600&q=80" alt="森林晨雾">
                <div class="overlay"><span>风光 / 森林</span></div>
            </div>
            
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80" alt="迷雾山野">
                <div class="overlay"><span>风光 / 迷雾</span></div>
            </div>
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1454372182658-c712e4c5a1db?auto=format&fit=crop&w=600&q=80" alt="星空摄影">
                <div class="overlay"><span>星空 / 夜晚</span></div>
            </div>
            </div>
    </main>

    <footer>
        <p>&copy; 2026 光影志 Photography. 保留所有权利。</p>
